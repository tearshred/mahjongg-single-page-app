<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="120"
   height="158"
   viewBox="0 0 120 158"
   version="1.1">
  <!-- LEFT EDGE (depth face) - Sharp polygon, no gradient -->
  <polygon
    points="0,8 8,0 8,150 0,158"
    fill="#8B8B8B"
    id="leftEdge" />
  
  <!-- BOTTOM EDGE (depth face) - Sharp polygon, no gradient -->
  <polygon
    points="8,150 120,150 112,158 0,158"
    fill="#B0B0B0"
    id="bottomEdge" />
  
  <!-- Main tile face (white rectangle) -->
  <rect
    x="8"
    y="0"
    width="112"
    height="150"
    fill="#FEFEFE"
    stroke="#E0E0E0"
    stroke-width="0.5"
    id="mainFace" />
  
  <!-- Subtle highlight on main face top edge -->
  <line
    x1="8" y1="0"
    x2="120" y2="0"
    stroke="#FFFFFF"
    stroke-width="1"
    opacity="0.8" />
</svg>
