<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="300"
   height="400"
   viewBox="0 0 300 400"
   version="1.1">
  <!-- Simplified tile: blue outline, white surface (gradients removed) -->

  <!-- Top face (white playing surface with navy blue bevel border) -->
  <g id="topFace">
     <!-- Navy blue outline (no gradients) -->
     <rect
       x="20"
       y="0"
       width="280"
       height="360"
       rx="40"
       ry="40"
       fill="none"
       stroke="#001f3f"
       stroke-width="8"
       id="bevelBorder" />

    <!-- White top surface (inset from bevel) -->
    <rect
       x="30"
       y="10"
       width="260"
       height="340"
       rx="35"
       ry="35"
       fill="#ffffff"
       id="whiteSurface" />
  </g>
</svg>
