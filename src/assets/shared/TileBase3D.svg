<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="300"
   height="400"
   viewBox="0 0 300 400"
   version="1.1">
  <defs>
    <!-- Gradient for left edge: navy blue to white (bottom to top) -->
    <linearGradient id="leftEdgeGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for bottom edge: navy blue to white (right to left) -->
    <linearGradient id="bottomEdgeGradient" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>

      <!-- Left edge (extends only the bevel thickness, covers rounded corners) -->
      <path
        d="M 20,40 L 20,320 A 40,40 0 0 1 0,360 L 0,20 A 40,40 0 0 1 20,40 Z"
        fill="url(#leftEdgeGradient)"
        id="leftEdge" />

      <!-- Bottom edge (extends only the bevel thickness, covers rounded corners) -->
      <path
        d="M 20,320 A 40,40 0 0 0 60,360 L 260,360 A 40,40 0 0 0 300,320 L 300,400 A 40,40 0 0 1 260,400 L 40,400 A 40,40 0 0 1 20,360 Z"
        fill="url(#bottomEdgeGradient)"
        id="bottomEdge" />

  <!-- Top face (white playing surface with navy blue bevel border) -->
  <g id="topFace">
    <!-- Navy blue bevel border -->
    <rect
       x="20"
       y="0"
       width="280"
       height="360"
       rx="40"
       ry="40"
       fill="#001f3f"
       id="bevelBorder" />

    <!-- White top surface (inset from bevel) -->
    <rect
       x="30"
       y="10"
       width="260"
       height="340"
       rx="35"
       ry="35"
       fill="#ffffff"
       id="whiteSurface" />
  </g>
</svg>
